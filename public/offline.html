<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Crisis Helplines</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #fff1f2; color: #881337; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
    h1 { font-size: 24px; margin-bottom: 10px; }
    p { margin-bottom: 30px; color: #9f1239; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; margin-bottom: 20px; text-align: left; }
    .title { font-weight: bold; font-size: 18px; margin-bottom: 4px; }
    .desc { font-size: 14px; color: #64748b; margin-bottom: 12px; }
    .btn { display: block; width: 100%; padding: 12px; background: #e11d48; color: white; text-align: center; border-radius: 8px; text-decoration: none; font-weight: bold; box-sizing: border-box; }
    .btn:hover { background: #be123c; }
    .btn-outline { background: transparent; color: #be123c; border: 1px solid #fda4af; }
  </style>
</head>
<body>
  <h1>We are here for you.</h1>
  <p>You appear to be offline, but support is always a phone call away.</p>
  
  <div class="card">
    <div class="title">Tele-MANAS (Govt. of India)</div>
    <div class="desc">24/7 National Toll-Free Mental Health Helpline</div>
    <a href="tel:14416" class="btn">Call 14416</a>
  </div>
  
  <div class="card">
    <div class="title">Vandrevala Foundation</div>
    <div class="desc">24/7 Multilingual Crisis Support</div>
    <a href="tel:9999666555" class="btn btn-outline">Call 9999 666 555</a>
  </div>
</body>
</html>
